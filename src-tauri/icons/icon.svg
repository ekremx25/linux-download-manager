<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Deep ocean → teal → mint gradient. Modern and distinctive. -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B4A6F"/>
      <stop offset="0.55" stop-color="#17A090"/>
      <stop offset="1" stop-color="#4FDCB3"/>
    </linearGradient>

    <!-- Glossy inner light for the arrow -->
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6FFF6"/>
    </linearGradient>

    <!-- Soft shadow so the arrow sits on top convincingly -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background (22% corner radius, the modern native look) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Top-edge highlight for depth -->
  <path
    d="M 0 128 Q 256 10, 512 128 L 512 192 Q 256 96, 0 192 Z"
    fill="#FFFFFF" fill-opacity="0.08"/>

  <!-- Download glyph: stem + arrowhead + tray, all clean geometric shapes -->
  <g fill="url(#arrow)" filter="url(#softShadow)">
    <!-- Stem -->
    <rect x="220" y="120" width="72" height="184" rx="18"/>
    <!-- Arrowhead: pentagon pointing down with rounded corners -->
    <path d="
      M 152 260
      L 360 260
      Q 384 260, 366 282
      L 276 386
      Q 256 408, 236 386
      L 146 282
      Q 128 260, 152 260
      Z"/>
    <!-- Tray line -->
    <rect x="128" y="416" width="256" height="32" rx="14"/>
  </g>
</svg>
